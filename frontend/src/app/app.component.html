<div class="min-h-screen bg-base-200 p-4" data-theme="light">

  <app-navbar (libToggle)="toggleLib()"></app-navbar>


  <!-- mach einen weißen hintergrund als block-->
   
    
<div class="flex flex-col items-start justify-start h-[calc(100dvh-2rem)] bg-white rounded-lg shadow-lg m-4"> 
    <!-- ── Bauteil-Bibliothek ────────────────────────────────── -->
     <div class= "flex flex-row items-center justify-start w-full">
    
    @if (libOpen()) {
    <div class="p-4 py-2 m-2 w-40 border border-gray-300 rounded-lg bg-base-100">
      <p class="text-sm text-black">Library</p>
    <div class="grid grid-cols-1 justify-start items-start sm:grid-cols-1 lg:grid-cols-1 max-h-96 overflow-y-auto gap-4 mb-2">
      @for (component of components(); track component.symbol; let i = $index) {
        <app-device-card
          [component]="component"
          (add)="addComponent(i)">
        </app-device-card>
      }
    </div>
     </div>
    }
     <!-- ── Schaltplan ───────────────────────────────────────── -->

    </div>



    
  <router-outlet />
</div>

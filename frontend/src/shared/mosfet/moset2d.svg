<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <defs>
    <!-- Schraffur für Depletionszone -->
    <pattern id="depletionPattern" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#d4b8e0"/>
      <line x1="0" y1="6" x2="6" y2="0" stroke="#a07cb8" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- ══════════════════════════════════════════════
       SUBSTRAT  p-Typ (hellblau)
       ══════════════════════════════════════════════ -->
  <rect x="60" y="240" width="580" height="140" fill="#bdd7ee" rx="2"/>
  <text x="320" y="370" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1a4a7a" font-weight="bold">p⁺⁺  Substrat  (Na ≈ 10¹⁷ cm⁻³)</text>

  <!-- ══════════════════════════════════════════════
       DEPLETIONSZONE unter Gate (lila Schraffur)
       ══════════════════════════════════════════════ -->
  <rect x="200" y="220" width="300" height="80" fill="url(#depletionPattern)" rx="2"/>
  <text x="350" y="212" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#5a2d82">Depletionszone – keine freien Träger</text>

  <!-- ══════════════════════════════════════════════
       SOURCE  n++ (linkes Gebiet, dunkelgrün)
       ══════════════════════════════════════════════ -->
  <rect x="60" y="160" width="140" height="140" fill="#5cb85c" rx="2"/>
  <text x="130" y="200" text-anchor="middle" font-size="13" font-family="sans-serif" fill="white" font-weight="bold">n⁺⁺</text>
  <text x="130" y="216" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#d4edda">Source</text>
  <text x="130" y="230" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#d4edda">Nd ≈ 10²⁰ cm⁻³</text>

  <!-- ══════════════════════════════════════════════
       DRAIN  n++ (rechtes Gebiet, dunkelgrün)
       ══════════════════════════════════════════════ -->
  <rect x="500" y="160" width="140" height="140" fill="#5cb85c" rx="2"/>
  <text x="570" y="200" text-anchor="middle" font-size="13" font-family="sans-serif" fill="white" font-weight="bold">n⁺⁺</text>
  <text x="570" y="216" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#d4edda">Drain</text>
  <text x="570" y="230" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#d4edda">Nd ≈ 10²⁰ cm⁻³</text>

  <!-- ══════════════════════════════════════════════
       GATE-OXID  SiO₂ (sehr dünn, gelb)
       ══════════════════════════════════════════════ -->
  <rect x="200" y="148" width="300" height="18" fill="#fff59d" stroke="#f0c030" stroke-width="1"/>
  <text x="350" y="161" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#7a6000">SiO₂  Gate-Oxid  (tox ≈ 10 nm)</text>

  <!-- ══════════════════════════════════════════════
       GATE-METALL  (dunkelgrau)
       ══════════════════════════════════════════════ -->
  <rect x="200" y="110" width="300" height="38" fill="#555" rx="2"/>
  <text x="350" y="134" text-anchor="middle" font-size="13" font-family="sans-serif" fill="white" font-weight="bold">Gate  (Metall / Poly-Si)</text>

  <!-- ══════════════════════════════════════════════
       ANSCHLÜSSE (Kontakte)
       ══════════════════════════════════════════════ -->
  <!-- Gate-Anschluss -->
  <line x1="350" y1="90" x2="350" y2="110" stroke="#333" stroke-width="3"/>
  <circle cx="350" cy="84" r="8" fill="#e8a000" stroke="#333" stroke-width="1.5"/>
  <text x="365" y="89" font-size="11" font-family="monospace" fill="#333" font-weight="bold">G  Vgs = 0V (sperrt)</text>

  <!-- Source-Anschluss -->
  <line x1="130" y1="140" x2="130" y2="160" stroke="#333" stroke-width="3"/>
  <circle cx="130" cy="134" r="8" fill="#e8a000" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="128" font-size="11" font-family="monospace" fill="#333" font-weight="bold">S</text>

  <!-- Drain-Anschluss -->
  <line x1="570" y1="140" x2="570" y2="160" stroke="#333" stroke-width="3"/>
  <circle cx="570" cy="134" r="8" fill="#e8a000" stroke="#333" stroke-width="1.5"/>
  <text x="575" y="128" font-size="11" font-family="monospace" fill="#333" font-weight="bold">D</text>

  <!-- Bulk-Anschluss (unten) -->
  <line x1="350" y1="380" x2="350" y2="398" stroke="#333" stroke-width="3"/>
  <circle cx="350" cy="405" r="8" fill="#e8a000" stroke="#333" stroke-width="1.5"/>
  <text x="362" y="409" font-size="11" font-family="monospace" fill="#333" font-weight="bold">B (GND)</text>

  <!-- ══════════════════════════════════════════════
       LADUNGSTRÄGER – SUBSTRAT (Löcher = rot ⊕)
       viele, gleichmäßig verteilt außerhalb Depletion
       ══════════════════════════════════════════════ -->
  <!-- Reihe 1 (y=258) – außerhalb Depletion links -->
  <text x="74"  y="262" font-size="13" fill="#c0392b">⊕</text>
  <text x="100" y="262" font-size="13" fill="#c0392b">⊕</text>
  <text x="126" y="262" font-size="13" fill="#c0392b">⊕</text>
  <text x="152" y="262" font-size="13" fill="#c0392b">⊕</text>
  <text x="178" y="262" font-size="13" fill="#c0392b">⊕</text>
  <!-- rechts der Depletion -->
  <text x="510" y="262" font-size="13" fill="#c0392b">⊕</text>
  <text x="536" y="262" font-size="13" fill="#c0392b">⊕</text>
  <text x="562" y="262" font-size="13" fill="#c0392b">⊕</text>
  <text x="588" y="262" font-size="13" fill="#c0392b">⊕</text>
  <text x="614" y="262" font-size="13" fill="#c0392b">⊕</text>

  <!-- Reihe 2 (y=288) – volle Breite unter Depletion -->
  <text x="74"  y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="100" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="126" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="152" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="178" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="218" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="258" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="298" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="338" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="378" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="418" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="458" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="498" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="536" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="574" y="290" font-size="13" fill="#c0392b">⊕</text>
  <text x="612" y="290" font-size="13" fill="#c0392b">⊕</text>

  <!-- Reihe 3 (y=320) -->
  <text x="74"  y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="108" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="142" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="176" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="220" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="264" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="308" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="352" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="396" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="440" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="484" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="528" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="572" y="320" font-size="13" fill="#c0392b">⊕</text>
  <text x="614" y="320" font-size="13" fill="#c0392b">⊕</text>

  <!-- ══════════════════════════════════════════════
       LADUNGSTRÄGER – SOURCE n++ (Elektronen = blau ⊖)
       ══════════════════════════════════════════════ -->
  <text x="75"  y="188" font-size="12" fill="#2980b9">⊖</text>
  <text x="100" y="188" font-size="12" fill="#2980b9">⊖</text>
  <text x="125" y="188" font-size="12" fill="#2980b9">⊖</text>
  <text x="150" y="188" font-size="12" fill="#2980b9">⊖</text>
  <text x="75"  y="210" font-size="12" fill="#2980b9">⊖</text>
  <text x="100" y="210" font-size="12" fill="#2980b9">⊖</text>
  <text x="125" y="210" font-size="12" fill="#2980b9">⊖</text>
  <text x="150" y="210" font-size="12" fill="#2980b9">⊖</text>
  <text x="75"  y="232" font-size="12" fill="#2980b9">⊖</text>
  <text x="100" y="232" font-size="12" fill="#2980b9">⊖</text>
  <text x="125" y="232" font-size="12" fill="#2980b9">⊖</text>
  <text x="150" y="232" font-size="12" fill="#2980b9">⊖</text>

  <!-- ══════════════════════════════════════════════
       LADUNGSTRÄGER – DRAIN n++ (Elektronen)
       ══════════════════════════════════════════════ -->
  <text x="510" y="188" font-size="12" fill="#2980b9">⊖</text>
  <text x="536" y="188" font-size="12" fill="#2980b9">⊖</text>
  <text x="562" y="188" font-size="12" fill="#2980b9">⊖</text>
  <text x="588" y="188" font-size="12" fill="#2980b9">⊖</text>
  <text x="510" y="210" font-size="12" fill="#2980b9">⊖</text>
  <text x="536" y="210" font-size="12" fill="#2980b9">⊖</text>
  <text x="562" y="210" font-size="12" fill="#2980b9">⊖</text>
  <text x="588" y="210" font-size="12" fill="#2980b9">⊖</text>
  <text x="510" y="232" font-size="12" fill="#2980b9">⊖</text>
  <text x="536" y="232" font-size="12" fill="#2980b9">⊖</text>
  <text x="562" y="232" font-size="12" fill="#2980b9">⊖</text>
  <text x="588" y="232" font-size="12" fill="#2980b9">⊖</text>

  <!-- ══════════════════════════════════════════════
       DEPLETIONSZONE: ionisierte Akzeptoren (⊟ = neg. Ionen)
       keine freien Löcher, keine Elektronen
       ══════════════════════════════════════════════ -->
  <text x="218" y="250" font-size="11" fill="#5a2d82">⊟</text>
  <text x="258" y="250" font-size="11" fill="#5a2d82">⊟</text>
  <text x="298" y="250" font-size="11" fill="#5a2d82">⊟</text>
  <text x="338" y="250" font-size="11" fill="#5a2d82">⊟</text>
  <text x="378" y="250" font-size="11" fill="#5a2d82">⊟</text>
  <text x="418" y="250" font-size="11" fill="#5a2d82">⊟</text>
  <text x="458" y="250" font-size="11" fill="#5a2d82">⊟</text>
  <text x="228" y="272" font-size="11" fill="#5a2d82">⊟</text>
  <text x="268" y="272" font-size="11" fill="#5a2d82">⊟</text>
  <text x="308" y="272" font-size="11" fill="#5a2d82">⊟</text>
  <text x="348" y="272" font-size="11" fill="#5a2d82">⊟</text>
  <text x="388" y="272" font-size="11" fill="#5a2d82">⊟</text>
  <text x="428" y="272" font-size="11" fill="#5a2d82">⊟</text>
  <text x="468" y="272" font-size="11" fill="#5a2d82">⊟</text>

  <!-- ══════════════════════════════════════════════
       KEIN KANAL – Trennlinie mit Text
       ══════════════════════════════════════════════ -->
  <line x1="200" y1="166" x2="500" y2="166" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="350" y="179" text-anchor="middle" font-size="10" font-family="sans-serif" fill="#e74c3c">✕  No Inversion Channel  (Vgs &lt; Vth)</text>

  

  <!-- Außenrahmen -->
  <rect x="60" y="108" width="580" height="280" fill="none" stroke="#555" stroke-width="2" rx="3"/>
</svg>
